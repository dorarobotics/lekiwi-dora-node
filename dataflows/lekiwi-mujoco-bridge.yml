# LeKiwi (arm + 3-wheel omni base) as one octos SPEC robot, driven in MuJoCo.
#
# The sim node is lekiwi-specific (lekiwi_node.mujoco_sim), NOT the generic
# dora-mujoco runner: the physics-ready scene disables contacts (single-body
# omniwheels can't roll), so the free base does not translate from wheel spin —
# base pose is kinematically integrated from the commanded wheel speeds. The tick
# period MUST equal SIM_DT (50 ms here) so the integrator advances in real time.
#
# Run from a directory whose ./venv-python has dora, mujoco, drive-kinematics,
# lekiwi_node, and octos_spec_bridge installed. Resolve ${LEKIWI_NODE} to this
# repo checkout.
nodes:
  - id: mujoco_sim
    path: ./venv-python
    args: -m lekiwi_node.mujoco_sim
    env:
      SIM_DT: "0.05"
      PYTHONPATH: "${LEKIWI_NODE}"
    inputs:
      tick: dora/timer/millis/50
      control: lekiwi_node/control
    outputs:
      - joint_positions

  - id: lekiwi_node
    path: ./venv-python
    args: -m lekiwi_node
    env:
      ROBOT_ID: lekiwi
      MOTION_DEADLINE_S: "60"
      VELOCITY_TIMEOUT_S: "0.5"
      PYTHONPATH: "${LEKIWI_NODE}"
    inputs:
      cmd_request: bridge/cmd_request
      joint_positions: mujoco_sim/joint_positions
    outputs:
      - control
      - cmd_response
      - capabilities

  - id: bridge
    path: ./venv-python
    args: -m octos_spec_bridge
    env:
      ROBOT_ID: lekiwi
      HTTP_HOST: "127.0.0.1"
      HTTP_PORT: "8770"
      CMD_TIMEOUT_S: "70"
      LOG_LEVEL: INFO
    inputs:
      cmd_response: lekiwi_node/cmd_response
      capabilities: lekiwi_node/capabilities
    outputs:
      - cmd_request
